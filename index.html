<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="AffMonitor">
<meta name="theme-color" content="#1a1a2e">
<title>Affiliate Monitor</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --ink:#1a1a2e;--bg:#f5f5f0;--white:#ffffff;--muted:#888;
  --border:#ddd;--adit:#e05a00;--najwa:#1a6fd4;--dio:#7b2fd4;
  --green:#22a85a;--red:#e03030;--amber:#e09000;
  --adit-bg:#fff4ef;--najwa-bg:#eff5ff;--dio-bg:#f5efff
}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--ink);font-size:14px}

/* SETUP */
#pg-setup{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:16px}
.setup-card{background:var(--white);border-radius:16px;padding:24px;width:100%;max-width:380px;box-shadow:0 4px 20px rgba(0,0,0,.1)}
.setup-logo{font-size:24px;font-weight:800;color:var(--ink);margin-bottom:4px}
.setup-logo span{color:var(--adit)}
.setup-sub{font-size:12px;color:var(--muted);margin-bottom:24px}
.setup-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:8px}
.who-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.who-btn{padding:16px 8px;border-radius:10px;border:2px solid var(--border);background:var(--white);font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;text-align:center}
.who-btn.on-adit{background:var(--adit);color:#fff;border-color:var(--adit)}
.who-btn.on-najwa{background:var(--najwa);color:#fff;border-color:var(--najwa)}
.who-btn.on-dio{background:var(--dio);color:#fff;border-color:var(--dio)}
.who-btn.on-owner{background:var(--ink);color:#fff;border-color:var(--ink)}
.setup-enter{width:100%;padding:14px;border-radius:10px;border:none;background:var(--border);color:#999;font-family:inherit;font-size:15px;font-weight:700;cursor:not-allowed}
.setup-enter.ok{background:var(--ink);color:#fff;cursor:pointer}

/* APP */
#pg-app{display:none;flex-direction:column;height:100vh}

/* HEADER */
.hdr{background:var(--ink);color:#fff;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.hdr-left{font-size:15px;font-weight:800}
.hdr-left span{font-weight:400;font-size:11px;color:#aaa;margin-left:6px}
.hdr-right{display:flex;align-items:center;gap:8px}
.sync-info{display:flex;align-items:center;gap:5px}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#555}
.sync-dot.ok{background:var(--green)}.sync-dot.busy{background:var(--amber)}.sync-dot.err{background:var(--red)}
.sync-time{font-size:9px;color:#aaa}
.hbtn{padding:5px 10px;border-radius:6px;border:1px solid #444;background:transparent;color:#ccc;font-family:inherit;font-size:10px;font-weight:600;cursor:pointer}

/* WEEK NAV */
.wnav{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;background:var(--white);border-bottom:1px solid var(--border);flex-shrink:0}
.wnav-btn{padding:6px 14px;border-radius:6px;border:1.5px solid var(--border);background:var(--bg);font-family:inherit;font-size:12px;font-weight:600;cursor:pointer}
.wnav-lbl{font-size:12px;font-weight:700;color:var(--ink)}

/* TABS */
.tabs{display:flex;border-bottom:2px solid var(--border);flex-shrink:0;background:var(--white)}
.tab-btn{flex:1;padding:10px 4px;border:none;background:transparent;font-family:inherit;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px}
.tab-btn.on{color:var(--ink);border-bottom-color:var(--ink)}

/* CONTENT */
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.page{display:none;padding:12px 16px 80px}
.page.on{display:block}

/* PERSON SECTION */
.person-block{margin-bottom:16px;border-radius:12px;overflow:hidden;border:1.5px solid var(--border)}
.person-head{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--border)}
.person-head.adit{background:var(--adit-bg);border-left:4px solid var(--adit)}
.person-head.najwa{background:var(--najwa-bg);border-left:4px solid var(--najwa)}
.person-head.dio{background:var(--dio-bg);border-left:4px solid var(--dio)}
.person-name{font-size:14px;font-weight:700}
.person-name.adit{color:var(--adit)}.person-name.najwa{color:var(--najwa)}.person-name.dio{color:var(--dio)}
.person-meta{font-size:11px;color:var(--muted)}
.task-list{background:var(--white)}
.task-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border);cursor:pointer}
.task-item:last-child{border-bottom:none}
.task-item:active{background:var(--bg)}
.task-cb{width:20px;height:20px;border-radius:5px;border:2px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800}
.task-item.done .task-cb{background:var(--green);border-color:var(--green);color:#fff}
.task-item.done .task-text{text-decoration:line-through;color:var(--muted)}
.task-text{flex:1;font-size:13px;line-height:1.4}
.task-del{width:28px;height:28px;border-radius:6px;border:none;background:transparent;color:var(--muted);font-size:16px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.task-del:active{background:#fee;color:var(--red)}
.add-task-row{display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--bg)}
.add-task-inp{flex:1;padding:8px 10px;border:1.5px solid var(--border);border-radius:8px;font-family:inherit;font-size:13px;background:var(--white);outline:none}
.add-task-inp:focus{border-color:var(--ink)}
.add-task-btn{padding:8px 12px;border-radius:8px;border:none;background:var(--ink);color:#fff;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;flex-shrink:0}

/* PRODUCTS */
.prod-card{background:var(--white);border-radius:12px;border:1.5px solid var(--border);margin-bottom:10px;overflow:hidden}
.prod-head{padding:12px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.prod-name{font-size:14px;font-weight:700}
.prod-pic{font-size:11px;color:var(--muted);margin-top:2px}
.prod-body{padding:10px 14px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.prod-status{padding:4px 10px;border:1.5px solid var(--border);border-radius:20px;font-family:inherit;font-size:11px;font-weight:600;background:var(--bg);cursor:pointer;flex:1}
.prod-del{width:32px;height:32px;border-radius:8px;border:1.5px solid var(--border);background:var(--white);color:var(--muted);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.prod-del:active{background:#fee;color:var(--red);border-color:var(--red)}
.status-badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;text-transform:uppercase}
.s-riset{background:#fff3e0;color:#b05500}.s-checkout{background:#e0f0ff;color:#005bb0}
.s-menunggu{background:#fff0eb;color:#c43000}.s-datang{background:#edfff5;color:#006830}
.s-konten{background:#f5efff;color:#5500b0}.s-editing{background:#eff5ff;color:#004db0}
.s-upload{background:#d4fde4;color:#005a20}.s-live{background:#c8fcd8;color:#003d15}.s-review{background:#ffe0e0;color:#a00000}

/* ADD PROD FORM */
.add-prod-form{background:var(--white);border-radius:12px;border:1.5px solid var(--border);padding:14px;margin-bottom:16px}
.add-prod-form h4{font-size:13px;font-weight:700;margin-bottom:12px}
.form-row{margin-bottom:10px}
.form-lbl{display:block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:4px}
.form-inp,.form-sel{width:100%;padding:9px 11px;border:1.5px solid var(--border);border-radius:8px;font-family:inherit;font-size:13px;color:var(--ink);background:var(--bg);outline:none}
.form-inp:focus,.form-sel:focus{border-color:var(--ink);background:var(--white)}
.form-btn{width:100%;padding:12px;border-radius:8px;border:none;background:var(--ink);color:#fff;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;margin-top:4px}

/* REPORT */
.report-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.report-card{background:var(--white);border-radius:12px;border:1.5px solid var(--border);overflow:hidden}
.report-card-head{padding:10px 12px;color:#fff;font-weight:800;font-size:14px}
.report-card-head.adit{background:var(--adit)}.report-card-head.najwa{background:var(--najwa)}.report-card-head.dio{background:var(--dio)}
.report-card-body{padding:10px 12px}
.report-row{display:flex;justify-content:space-between;font-size:12px;padding:3px 0;border-bottom:1px solid var(--border)}
.report-row:last-child{border-bottom:none}
.report-val{font-weight:700}
.prog-bar{height:6px;background:var(--border);border-radius:6px;overflow:hidden;margin-top:8px}
.prog-fill{height:100%;border-radius:6px;transition:width .4s}

/* CONFIRM DIALOG */
#confirm-dialog{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:999;align-items:center;justify-content:center}
#confirm-dialog.show{display:flex}
.confirm-box{background:#fff;border-radius:14px;padding:24px;width:280px;text-align:center}
.confirm-box h4{font-size:16px;font-weight:700;margin-bottom:8px}
.confirm-box p{font-size:13px;color:var(--muted);margin-bottom:20px;line-height:1.5}
.confirm-btns{display:flex;gap:10px}
.confirm-no{flex:1;padding:10px;border-radius:8px;border:1.5px solid var(--border);background:#fff;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer}
.confirm-yes{flex:1;padding:10px;border-radius:8px;border:none;background:var(--red);color:#fff;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer}

/* TOAST */
.toast{display:none;position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:10px 20px;border-radius:24px;font-size:13px;font-weight:600;z-index:1000;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,.2)}
.toast.show{display:block}

@media(max-width:480px){.report-grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<!-- SETUP -->
<div id="pg-setup">
  <div class="setup-card">
    <div class="setup-logo">Affiliate <span>Monitor</span></div>
    <div class="setup-sub">Dashboard tim affiliate — pilih nama untuk masuk</div>
    <div class="setup-label">Kamu siapa?</div>
    <div class="who-btns">
      <button class="who-btn" id="wb-adit">👤 Adit</button>
      <button class="who-btn" id="wb-najwa">👤 Najwa</button>

      <button class="who-btn" id="wb-owner">👑 Owner</button>

</div>

<!-- APP -->
<div id="pg-app">
  <div class="hdr">
    <div class="hdr-left">AffMonitor <span id="hdr-who"></span></div>
    <div class="hdr-right">
      <div class="sync-info">
        <div class="sync-dot" id="sync-dot"></div>
        <span class="sync-time" id="sync-time">—</span>
      </div>
      <button class="hbtn" id="btn-sync">↻ Sync</button>
      <button class="hbtn" id="btn-logout">Keluar</button>
    </div>
  </div>

  <div class="wnav">
    <button class="wnav-btn" id="btn-prev">‹ Lalu</button>
    <span class="wnav-lbl" id="wnav-lbl">Minggu Ini</span>
    <button class="wnav-btn" id="btn-next">Depan ›</button>
  </div>

  <div class="tabs">
    <button class="tab-btn on" id="tab-tasks">✅ Tugas</button>
    <button class="tab-btn" id="tab-products">🛍 Produk</button>
    <button class="tab-btn" id="tab-report">📊 Laporan</button>
  </div>

  <div class="content">

    <!-- TASKS PAGE -->
    <div class="page on" id="pg-tasks"></div>

    <!-- PRODUCTS PAGE -->
    <div class="page" id="pg-products">
      <div class="add-prod-form">
        <h4>➕ Tambah Produk</h4>
        <div class="form-row">
          <label class="form-lbl">Nama Produk</label>
          <input class="form-inp" id="pf-name" placeholder="Nama produk...">
        </div>
        <div class="form-row">
          <label class="form-lbl">PIC</label>
          <select class="form-sel" id="pf-pic">
            <option value="Adit">Adit</option>
            <option value="Najwa">Najwa</option>
            <option value="Dio">Dio</option>
          </select>
        </div>
        <div class="form-row">
          <label class="form-lbl">Status</label>
          <select class="form-sel" id="pf-status">
            <option value="riset">Riset</option>
            <option value="checkout">Check Out</option>
            <option value="menunggu">Menunggu Datang</option>
            <option value="datang">Produk Datang</option>
            <option value="konten">Buat Konten</option>
            <option value="editing">Editing</option>
            <option value="upload">Upload</option>
            <option value="live">Live</option>
            <option value="review">Review</option>
          </select>
        </div>
        <button class="form-btn" id="btn-add-prod">Tambah Produk</button>
      </div>
      <div id="prod-list"></div>
    </div>

    <!-- REPORT PAGE -->
    <div class="page" id="pg-report">
      <div class="report-grid" id="report-grid"></div>
    </div>

  </div>
</div>

<!-- CONFIRM -->
<div id="confirm-dialog">
  <div class="confirm-box">
    <h4>Hapus?</h4>
    <p id="confirm-msg">Item ini akan dihapus permanen.</p>
    <div class="confirm-btns">
      <button class="confirm-no" id="confirm-no">Batal</button>
      <button class="confirm-yes" id="confirm-yes">Hapus</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── CONFIG ──────────────────────────────────────────
var SB = 'https://knvmvdjgsdikoglhcaxr.supabase.co/rest/v1/appdata';
var KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imtudm12ZGpnc2Rpa29nbGhjYXhyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3NTM4MTksImV4cCI6MjA5MjMyOTgxOX0.QHnaq09tGBcfb5UwyrQFTMTQbimxyRGriD-_mPxntB8';

var DIVS = [
  {id:'adit', name:'Adit', role:'Produk & Konten', color:'var(--adit)'},
  {id:'najwa',name:'Najwa',role:'Edit & Ops',      color:'var(--najwa)'},
  {id:'dio',  name:'Dio',  role:'Media Sosial',    color:'var(--dio)'}
];
var DAYS = ['Senin','Selasa','Rabu','Kamis','Jumat','Sabtu','Minggu'];
var STAGES = ['riset','checkout','menunggu','datang','konten','editing','upload','live','review'];
var SL = {riset:'Riset',checkout:'Checkout',menunggu:'Menunggu',datang:'Datang',konten:'Konten',editing:'Editing',upload:'Upload',live:'Live',review:'Review'};

var DEF_TASKS = [
  {id:1,div:'adit',day:0,text:'Riset produk trending minggu ini',done:false},
  {id:2,div:'adit',day:0,text:'Ajukan list produk ke Najwa',done:false},
  {id:3,div:'adit',day:1,text:'Buat konten produk batch 1',done:false},
  {id:4,div:'adit',day:1,text:'Shooting konten produk',done:false},
  {id:5,div:'adit',day:2,text:'Buat konten produk batch 2',done:false},
  {id:6,div:'adit',day:3,text:'Riset produk untuk minggu depan',done:false},
  {id:7,div:'adit',day:4,text:'Review performance konten',done:false},
  {id:8,div:'najwa',day:0,text:'Proses checkout produk dari Adit',done:false},
  {id:9,div:'najwa',day:1,text:'Edit video konten batch 1',done:false},
  {id:10,div:'najwa',day:2,text:'Edit video konten batch 2',done:false},
  {id:11,div:'najwa',day:2,text:'Upload ke TikTok Affiliate',done:false},
  {id:12,div:'najwa',day:3,text:'Upload ke Shopee Affiliate',done:false},
  {id:13,div:'najwa',day:3,text:'Kirim link ke Dio',done:false},
  {id:14,div:'dio',day:0,text:'Review engagement minggu lalu',done:false},
  {id:15,div:'dio',day:2,text:'Siapkan caption penyebaran link',done:false},
  {id:16,div:'dio',day:3,text:'Sebar link TikTok ke IG',done:false},
  {id:17,div:'dio',day:3,text:'Sebar link Shopee ke Threads & FB',done:false},
  {id:18,div:'dio',day:4,text:'Monitor engagement & balas komentar',done:false},
  {id:19,div:'dio',day:4,text:'Laporan reach ke owner',done:false}
];

// ── STATE ────────────────────────────────────────────
var who = '';
var tasks = [];
var products = [];
var weekOff = 0;
var curTab = 'tasks';
var confirmCb = null;
var toastTimer = null;

var TODAY = new Date();
var todayDayIdx = (function(){ var d = TODAY.getDay(); return d === 0 ? 6 : d - 1; }());

function getMon(off) {
  var d = new Date(TODAY);
  var day = d.getDay();
  d.setDate(d.getDate() - day + (day === 0 ? -6 : 1) + off * 7);
  return d;
}
var MON = getMon(0);

// ── STORAGE ──────────────────────────────────────────
function lsSet(k,v){ try{ localStorage.setItem(k,v); }catch(e){} }
function lsGet(k){ try{ return localStorage.getItem(k); }catch(e){ return null; } }
function lsDel(k){ try{ localStorage.removeItem(k); }catch(e){} }

// ── TOAST ────────────────────────────────────────────
function toast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  if (toastTimer) { clearTimeout(toastTimer); }
  toastTimer = setTimeout(function(){ t.classList.remove('show'); }, 2500);
}

// ── CONFIRM ──────────────────────────────────────────
function confirm(msg, cb) {
  document.getElementById('confirm-msg').textContent = msg;
  document.getElementById('confirm-dialog').className = 'show';
  confirmCb = cb;
}

// ── SYNC STATE ───────────────────────────────────────
function setSyncState(s, lbl) {
  document.getElementById('sync-dot').className = 'sync-dot' + (s ? ' ' + s : '');
  document.getElementById('sync-time').textContent = lbl || '—';
}

// ── SUPABASE ─────────────────────────────────────────
function sbRead(cb) {
  setSyncState('busy', 'Syncing...');
  fetch(SB + '?select=key,value&apikey=' + KEY)
  .then(function(r) {
    if (!r.ok) { throw new Error('HTTP ' + r.status); }
    return r.json();
  })
  .then(function(rows) {
    var i, parsed;
    for (i = 0; i < rows.length; i++) {
      try {
        parsed = JSON.parse(rows[i].value);
        if (rows[i].key === 'tasks' && parsed && parsed.length > 0) {
          tasks = parsed;
          lsSet('aff_tasks', rows[i].value);
        }
        if (rows[i].key === 'products' && parsed) {
          products = parsed;
          lsSet('aff_prods', rows[i].value);
        }
      } catch(e) {}
    }
    var t = new Date().toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'});
    setSyncState('ok', t);
    if (cb) { cb(); }
  })
  .catch(function(err) {
    setSyncState('err', 'Gagal');
    toast('Sync gagal: ' + err.message);
  });
}

function sbWrite(cb) {
  setSyncState('busy', 'Menyimpan...');
  fetch(SB + '?apikey=' + KEY + '&on_conflict=key', {
    method: 'POST',
    headers: {'Content-Type':'application/json','Prefer':'resolution=merge-duplicates,return=minimal'},
    body: JSON.stringify({key:'tasks', value: JSON.stringify(tasks)})
  })
  .then(function(r) {
    if (!r.ok) { throw new Error('HTTP ' + r.status); }
    return fetch(SB + '?apikey=' + KEY + '&on_conflict=key', {
      method: 'POST',
      headers: {'Content-Type':'application/json','Prefer':'resolution=merge-duplicates,return=minimal'},
      body: JSON.stringify({key:'products', value: JSON.stringify(products)})
    });
  })
  .then(function(r) {
    if (!r.ok) { throw new Error('HTTP ' + r.status); }
    var t = new Date().toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'});
    setSyncState('ok', t);
    toast('✅ Tersimpan!');
    if (cb) { cb(); }
  })
  .catch(function(err) {
    setSyncState('err', 'Gagal');
    toast('Gagal simpan: ' + err.message);
  });
}

// ── RENDER TASKS ─────────────────────────────────────
function renderTasks() {
  var sun = new Date(MON); sun.setDate(MON.getDate() + 6);
  var fmt = function(d){ return d.toLocaleDateString('id-ID',{day:'numeric',month:'short'}); };
  var html = '';
  var di, ci, ti, dv, dayTasks, t, tags;

  for (di = 0; di < DIVS.length; di++) {
    dv = DIVS[di];
    var total = 0, done = 0;
    for (ti = 0; ti < tasks.length; ti++) {
      if (tasks[ti].div === dv.id) { total++; if (tasks[ti].done) { done++; } }
    }
    html += '<div class="person-block">';
    html += '<div class="person-head ' + dv.id + '">';
    html += '<div><div class="person-name ' + dv.id + '">' + dv.name + '</div><div class="person-meta">' + dv.role + '</div></div>';
    html += '<div class="person-meta">' + done + '/' + total + ' selesai</div>';
    html += '</div>';
    html += '<div class="task-list">';

    for (ci = 0; ci < 7; ci++) {
      dayTasks = [];
      for (ti = 0; ti < tasks.length; ti++) {
        if (tasks[ti].div === dv.id && tasks[ti].day === ci) { dayTasks.push(tasks[ti]); }
      }
      if (dayTasks.length === 0) { continue; }

      var dt = new Date(MON); dt.setDate(MON.getDate() + ci);
      var isToday = (weekOff === 0 && ci === todayDayIdx);
      html += '<div style="padding:6px 14px;background:' + (isToday ? '#fff8f0' : '#fafafa') + ';border-bottom:1px solid var(--border);font-size:10px;font-weight:700;color:' + (isToday ? 'var(--adit)' : 'var(--muted)') + ';text-transform:uppercase;letter-spacing:.06em">'
        + (isToday ? '● ' : '') + DAYS[ci] + ', ' + fmt(dt) + '</div>';

      for (ti = 0; ti < dayTasks.length; ti++) {
        t = dayTasks[ti];
        html += '<div class="task-item' + (t.done ? ' done' : '') + '" data-id="' + t.id + '">';
        html += '<div class="task-cb">' + (t.done ? '✓' : '') + '</div>';
        html += '<div class="task-text">' + esc(t.text) + '</div>';
        html += '<button class="task-del" data-id="' + t.id + '">×</button>';
        html += '</div>';
      }
    }

    html += '<div class="add-task-row" data-div="' + dv.id + '">';
    html += '<input class="add-task-inp" placeholder="Tambah tugas ' + dv.name + '..." data-div="' + dv.id + '">';
    html += '<select style="padding:8px;border:1.5px solid var(--border);border-radius:8px;font-family:inherit;font-size:12px;background:var(--white);margin-right:4px" data-div="' + dv.id + '" class="add-task-day">';
    for (ci = 0; ci < 7; ci++) { html += '<option value="' + ci + '">' + DAYS[ci] + '</option>'; }
    html += '</select>';
    html += '<button class="add-task-btn" data-div="' + dv.id + '">+</button>';
    html += '</div>';
    html += '</div></div>';
  }

  var pg = document.getElementById('pg-tasks');
  pg.innerHTML = html;

  // Bind task toggle & delete
  var items = pg.querySelectorAll('.task-item');
  var i;
  for (i = 0; i < items.length; i++) {
    items[i].addEventListener('click', function(e) {
      if (e.target.classList.contains('task-del')) { return; }
      var id = parseInt(this.getAttribute('data-id'), 10);
      toggleTask(id);
    });
  }
  var dels = pg.querySelectorAll('.task-del');
  for (i = 0; i < dels.length; i++) {
    dels[i].addEventListener('click', function(e) {
      e.stopPropagation();
      var id = parseInt(this.getAttribute('data-id'), 10);
      var t = findTask(id);
      confirm(t ? '"' + t.text + '"' : 'Tugas ini?', function() { deleteTask(id); });
    });
  }
  var addBtns = pg.querySelectorAll('.add-task-btn');
  for (i = 0; i < addBtns.length; i++) {
    addBtns[i].addEventListener('click', function() {
      var div = this.getAttribute('data-div');
      var row = this.parentNode;
      var inp = row.querySelector('.add-task-inp');
      var daySel = row.querySelector('.add-task-day');
      var txt = inp.value.trim();
      if (!txt) { inp.focus(); return; }
      addTask(div, parseInt(daySel.value, 10), txt);
      inp.value = '';
    });
  }
  var inps = pg.querySelectorAll('.add-task-inp');
  for (i = 0; i < inps.length; i++) {
    inps[i].addEventListener('keydown', function(e) {
      if (e.key !== 'Enter') { return; }
      var div = this.getAttribute('data-div');
      var row = this.parentNode;
      var daySel = row.querySelector('.add-task-day');
      var txt = this.value.trim();
      if (!txt) { return; }
      addTask(div, parseInt(daySel.value, 10), txt);
      this.value = '';
    });
  }
}

// ── TASK ACTIONS ─────────────────────────────────────
function findTask(id) {
  var i;
  for (i = 0; i < tasks.length; i++) { if (tasks[i].id === id) { return tasks[i]; } }
  return null;
}

function toggleTask(id) {
  var t = findTask(id);
  if (!t) { return; }
  t.done = !t.done;
  lsSet('aff_tasks', JSON.stringify(tasks));
  renderTasks();
  renderReport();
  sbWrite(null);
}

function addTask(div, day, text) {
  var nid = 1, i;
  for (i = 0; i < tasks.length; i++) { if (tasks[i].id >= nid) { nid = tasks[i].id + 1; } }
  tasks.push({id:nid, div:div, day:day, text:text, done:false});
  lsSet('aff_tasks', JSON.stringify(tasks));
  renderTasks();
  renderReport();
  sbWrite(null);
  toast('✅ Tugas ditambahkan!');
}

function deleteTask(id) {
  var newT = [], i;
  for (i = 0; i < tasks.length; i++) { if (tasks[i].id !== id) { newT.push(tasks[i]); } }
  tasks = newT;
  lsSet('aff_tasks', JSON.stringify(tasks));
  renderTasks();
  renderReport();
  sbWrite(null);
  toast('Tugas dihapus');
}

// ── RENDER PRODUCTS ──────────────────────────────────
function renderProducts() {
  var html = '', i, p, sel;
  if (!products.length) {
    html = '<div style="text-align:center;padding:32px;color:var(--muted);font-size:13px">Belum ada produk. Tambah di atas!</div>';
    document.getElementById('prod-list').innerHTML = html;
    return;
  }
  for (i = 0; i < products.length; i++) {
    p = products[i];
    sel = '';
    var j;
    for (j = 0; j < STAGES.length; j++) {
      sel += '<option value="' + STAGES[j] + '"' + (STAGES[j] === p.status ? ' selected' : '') + '>' + SL[STAGES[j]] + '</option>';
    }
    html += '<div class="prod-card">';
    html += '<div class="prod-head"><div><div class="prod-name">' + esc(p.name) + '</div><div class="prod-pic">PIC: ' + esc(p.pic) + '</div></div>';
    html += '<span class="status-badge s-' + p.status + '">' + (SL[p.status]||p.status) + '</span></div>';
    html += '<div class="prod-body"><select class="prod-status" data-idx="' + i + '">' + sel + '</select>';
    html += '<button class="prod-del" data-idx="' + i + '">×</button></div>';
    html += '</div>';
  }
  document.getElementById('prod-list').innerHTML = html;

  var sels = document.querySelectorAll('.prod-status');
  var k;
  for (k = 0; k < sels.length; k++) {
    sels[k].addEventListener('change', function() {
      var idx = parseInt(this.getAttribute('data-idx'), 10);
      products[idx].status = this.value;
      lsSet('aff_prods', JSON.stringify(products));
      renderProducts();
      sbWrite(null);
      toast('Status diupdate!');
    });
  }
  var dels = document.querySelectorAll('.prod-del');
  for (k = 0; k < dels.length; k++) {
    dels[k].addEventListener('click', function() {
      var idx = parseInt(this.getAttribute('data-idx'), 10);
      var name = products[idx].name;
      confirm('Hapus produk "' + name + '"?', function() {
        products.splice(idx, 1);
        lsSet('aff_prods', JSON.stringify(products));
        renderProducts();
        sbWrite(null);
        toast('Produk dihapus');
      });
    });
  }
}

// ── RENDER REPORT ────────────────────────────────────
function renderReport() {
  var html = '', i, j, d, tot, dn, pct;
  for (i = 0; i < DIVS.length; i++) {
    d = DIVS[i]; tot = 0; dn = 0;
    for (j = 0; j < tasks.length; j++) {
      if (tasks[j].div === d.id) { tot++; if (tasks[j].done) { dn++; } }
    }
    pct = tot ? Math.round(dn / tot * 100) : 0;
    html += '<div class="report-card">';
    html += '<div class="report-card-head ' + d.id + '">' + d.name + '<div style="font-size:10px;font-weight:400;opacity:.7;margin-top:2px">' + d.role + '</div></div>';
    html += '<div class="report-card-body">';
    html += '<div class="report-row"><span>Total</span><span class="report-val">' + tot + '</span></div>';
    html += '<div class="report-row"><span>Selesai</span><span class="report-val" style="color:var(--green)">' + dn + '</span></div>';
    html += '<div class="report-row"><span>Belum</span><span class="report-val" style="color:var(--red)">' + (tot-dn) + '</span></div>';
    html += '<div class="prog-bar"><div class="prog-fill" style="width:' + pct + '%;background:var(--' + d.id + ')"></div></div>';
    html += '<div style="text-align:right;font-size:11px;font-weight:700;margin-top:4px">' + pct + '%</div>';
    html += '</div></div>';
  }
  document.getElementById('report-grid').innerHTML = html;
}

// ── WEEK NAV ─────────────────────────────────────────
function updateWeekLabel() {
  var lbl = weekOff === 0 ? 'Minggu Ini' : weekOff === 1 ? 'Minggu Depan' : weekOff === -1 ? 'Minggu Lalu' : 'Offset ' + weekOff;
  document.getElementById('wnav-lbl').textContent = lbl;
}

// ── TAB NAV ──────────────────────────────────────────
function switchTab(tab) {
  curTab = tab;
  var pages = ['tasks','products','report'];
  var i;
  for (i = 0; i < pages.length; i++) {
    document.getElementById('pg-' + pages[i]).classList.toggle('on', pages[i] === tab);
    document.getElementById('tab-' + pages[i]).classList.toggle('on', pages[i] === tab);
  }
  if (tab === 'tasks') { renderTasks(); }
  if (tab === 'products') { renderProducts(); }
  if (tab === 'report') { renderReport(); }
}

// ── HELPERS ──────────────────────────────────────────
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── SETUP ────────────────────────────────────────────
function pickWho(w) {
  who = w;
  var btns = document.querySelectorAll('.who-btn'), i;
  for (i = 0; i < btns.length; i++) { btns[i].className = 'who-btn'; }
  document.getElementById('wb-' + w).className = 'who-btn on-' + w;
  var btn = document.getElementById('setup-enter');
  btn.textContent = 'Masuk sebagai ' + w.charAt(0).toUpperCase() + w.slice(1) + ' →';
  btn.className = 'setup-enter ok';
}

function doLaunch() {
  if (!who) { return; }
  lsSet('aff_who', who);
  document.getElementById('pg-setup').style.display = 'none';
  document.getElementById('pg-app').style.display = 'flex';
  document.getElementById('hdr-who').textContent = who.charAt(0).toUpperCase() + who.slice(1);

  var lt = lsGet('aff_tasks');
  var lp = lsGet('aff_prods');
  tasks = lt ? JSON.parse(lt) : JSON.parse(JSON.stringify(DEF_TASKS));
  products = lp ? JSON.parse(lp) : [];

  weekOff = 0; MON = getMon(0);
  updateWeekLabel();
  renderTasks();
  renderReport();

  sbRead(function() { renderTasks(); renderReport(); renderProducts(); });
}

function doLogout() {
  lsDel('aff_who');
  who = '';
  document.getElementById('pg-app').style.display = 'none';
  var btns = document.querySelectorAll('.who-btn'), i;
  for (i = 0; i < btns.length; i++) { btns[i].className = 'who-btn'; }
  document.getElementById('setup-enter').textContent = 'Pilih nama dulu ↑';
  document.getElementById('setup-enter').className = 'setup-enter';
  document.getElementById('pg-setup').style.display = 'flex';
  toast('Logged out');
}

// ── INIT ─────────────────────────────────────────────
window.onload = function() {
  // Setup
  document.getElementById('wb-adit').addEventListener('click', function(){ pickWho('adit'); });
  document.getElementById('wb-najwa').addEventListener('click', function(){ pickWho('najwa'); });
  document.getElementById('wb-dio').addEventListener('click', function(){ pickWho('dio'); });
  document.getElementById('wb-owner').addEventListener('click', function(){ pickWho('owner'); });
  document.getElementById('setup-enter').addEventListener('click', doLaunch);

  // Header
  document.getElementById('btn-sync').addEventListener('click', function() {
    sbRead(function() { renderTasks(); renderReport(); renderProducts(); });
  });
  document.getElementById('btn-logout').addEventListener('click', doLogout);

  // Week nav
  document.getElementById('btn-prev').addEventListener('click', function() {
    weekOff--; MON = getMon(weekOff); updateWeekLabel(); renderTasks();
  });
  document.getElementById('btn-next').addEventListener('click', function() {
    weekOff++; MON = getMon(weekOff); updateWeekLabel(); renderTasks();
  });

  // Tabs
  document.getElementById('tab-tasks').addEventListener('click', function(){ switchTab('tasks'); });
  document.getElementById('tab-products').addEventListener('click', function(){ switchTab('products'); });
  document.getElementById('tab-report').addEventListener('click', function(){ switchTab('report'); });

  // Add product
  document.getElementById('btn-add-prod').addEventListener('click', function() {
    var name = document.getElementById('pf-name').value.trim();
    if (!name) { document.getElementById('pf-name').focus(); return; }
    products.push({
      name: name,
      pic: document.getElementById('pf-pic').value,
      status: document.getElementById('pf-status').value
    });
    lsSet('aff_prods', JSON.stringify(products));
    document.getElementById('pf-name').value = '';
    renderProducts();
    sbWrite(null);
    toast('✅ Produk ditambahkan!');
  });

  // Confirm dialog
  document.getElementById('confirm-yes').addEventListener('click', function() {
    document.getElementById('confirm-dialog').className = '';
    if (confirmCb) { confirmCb(); confirmCb = null; }
  });
  document.getElementById('confirm-no').addEventListener('click', function() {
    document.getElementById('confirm-dialog').className = '';
    confirmCb = null;
  });

  // Auto login
  var w = lsGet('aff_who');
  if (w) { who = w; doLaunch(); }
  else { document.getElementById('pg-setup').style.display = 'flex'; }
};
</script>
